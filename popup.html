<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Suno Bulk Download</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="popup">
      <h1>Suno Bulk Download</h1>

      <details class="row">
        <summary>Advanced regex</summary>
        <div class="regex-input-wrap">
          <input
            id="regexInput"
            type="text"
            value="<a[^>]*href=&quot;[^&quot;]*song/([0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12})[^&quot;]*&quot;[^>]*>([^&lt;]+)</a>"
          />
          <button
            id="regexResetBtn"
            type="button"
            class="regex-reset-btn"
            aria-label="Reset regex to default"
            title="Reset to default"
          >
            <svg class="regex-reset-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="currentColor"
                d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08a5.99 5.99 0 01-5.65 4c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"
              />
            </svg>
          </button>
        </div>
      </details>

      <div class="row buttons">
        <button id="scanBtn" type="button">Find songs</button>
      </div>

      <p id="status">No Suno scan yet.</p>

      <div class="row">
        <button id="toggleAllBtn" type="button" disabled>Select all</button>
      </div>
      <div id="resultsList" class="results-list"></div>
<br />
      <div class="row output-section">
        <input id="outputTemplateInput" class="compact-input" type="text" value="&lt;title&gt;" />
        <button id="downloadCheckedBtn" type="button" disabled>Download selected</button>
      </div>

      <div id="coffeeWrap" class="coffee-wrap is-hidden">
        <div class="coffee-msg-row">
          <p class="coffee-msg">
            If this tool have saved you time, please consider supporting.
          </p>
          <button
            id="coffeeDismissBtn"
            type="button"
            class="coffee-dismiss"
            data-tooltip="I have already donated"
            aria-label="Dismiss support message"
          >
            ×
          </button>
        </div>
        <div class="coffee-links">
          <a href="https://www.buymeacoffee.com/nologos" target="_blank">
            <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me a Coffee" style="height: 60px !important;width: 217px !important;">
          </a>

          <a
            id="coffeeQrLink"
            class="coffee-link"
            href="https://www.buymeacoffee.com/nologos"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img class="coffee-img" src="cf.png" alt="Buy me a coffee QR code" />
          </a>
        </div>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
